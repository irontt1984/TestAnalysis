<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>교직원 업무분장 조정판</title>
<style>
:root{--bg:#f3f5f9;--panel:#fff;--ink:#162033;--muted:#667085;--line:#dbe1ea;--brand:#1d4ed8;--brandSoft:#e8efff;--success:#087443;--warning:#b54708;--shadow:0 1px 3px rgba(16,24,40,.08),0 8px 22px rgba(16,24,40,.04);--r:14px}
*{box-sizing:border-box}body{margin:0;font-family:"Pretendard","Noto Sans KR","Malgun Gothic",Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.top{display:flex;align-items:center;gap:14px;padding:12px 18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;margin-right:auto}.logo{width:40px;height:40px;border-radius:12px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px}.brand h1{font-size:18px;margin:0}.brand small{color:var(--muted)}
input,textarea,select,button{font:inherit}button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 11px;cursor:pointer;color:var(--ink)}button:hover{border-color:#aec1e8;background:#f8fbff}.primary{background:var(--brand);border-color:var(--brand);color:#fff}.primary:hover{background:#163fb1;color:#fff}.danger{color:#b42318}.toolbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.saved{font-size:12px;color:var(--success);min-width:92px}
.tabs{display:flex;padding:0 18px;gap:5px;overflow:auto}.tab{border:0;border-radius:9px 9px 0 0;padding:10px 14px;color:var(--muted);background:transparent}.tab.active{background:var(--brandSoft);color:var(--brand);font-weight:700}
main{padding:18px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.controls{display:flex;gap:9px;align-items:center;flex-wrap:wrap;padding:12px;margin-bottom:14px}.controls input[type=search]{min-width:260px;flex:1;max-width:480px;border:1px solid var(--line);padding:9px 11px;border-radius:9px}.pill{border-radius:30px;padding:7px 11px}.pill.on{background:var(--brandSoft);border-color:#adc3fa;color:var(--brand);font-weight:600}
.grid-wrap{display:grid;grid-template-columns:minmax(0,1fr) 275px;gap:14px}.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(305px,1fr));gap:12px;align-items:start}
.dept{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;min-height:140px;box-shadow:var(--shadow)}.dept.over{outline:3px solid #84adff}.dept.support .dept-head{background:#f0f9ff}.dept.parking .dept-head{background:#fff7ed}
.dept-head{padding:11px 12px;background:var(--brandSoft);border-bottom:1px solid var(--line)}.dept-title{display:flex;gap:7px;align-items:center}.dept-title input{min-width:0;font-size:16px;font-weight:700;border:0;background:transparent;width:100%;padding:4px}.dept-title input:focus{background:#fff;outline:1px solid #99b9ff;border-radius:5px}.badge{font-size:11px;color:var(--muted);white-space:nowrap}
.headline{display:flex;gap:5px;align-items:center;color:var(--muted);font-size:12px;margin-top:5px}.headline input{border:0;border-bottom:1px dashed #cbd5e1;background:transparent;width:88px;padding:2px 4px;color:var(--ink)}
.cards{padding:8px;min-height:65px}.assignment{border:1px solid #e4e8f0;background:#fff;border-radius:10px;padding:8px;margin-bottom:8px}.assignment.dragging,.task.dragging{opacity:.4}.assignment-top{display:grid;grid-template-columns:1fr 1fr 64px auto;gap:5px;align-items:center;margin-bottom:7px}.assignment-top input{width:100%;border:1px solid var(--line);border-radius:6px;padding:5px 6px;font-size:12px}.assignment-top button{padding:4px 6px;font-size:12px}.handle{cursor:grab;color:#98a2b3;font-size:15px}
.tasks{min-height:10px}.tasks.over{background:#eef4ff;border-radius:7px;outline:2px dashed #8baaf0}.task{display:flex;align-items:flex-start;gap:5px;background:#f7f9fc;border:1px solid #edf0f5;border-radius:7px;padding:5px;margin-top:5px}.task span{cursor:grab;color:#98a2b3}.task textarea{border:0;background:transparent;resize:none;overflow:hidden;width:100%;min-height:25px;line-height:1.35;padding:2px;font-size:12px}.task button{border:0;background:transparent;padding:1px 4px;color:#98a2b3}.addrow{display:flex;gap:5px;margin-top:7px}.mini{font-size:12px;padding:5px 7px;background:#fafbfc}
.side{padding:12px;position:sticky;top:114px;max-height:calc(100vh - 135px);overflow:auto}.side h3{font-size:15px;margin:0 0 10px}.metric{display:flex;gap:10px;margin-bottom:12px}.metric div{background:#f7f9fc;border-radius:9px;padding:8px;flex:1;text-align:center}.metric strong{display:block;font-size:20px}.person{display:grid;grid-template-columns:1fr auto auto;gap:7px;border-bottom:1px solid #eef2f7;padding:6px 2px;font-size:12px}.person button{padding:1px 5px;border:0;color:var(--brand)}
.table-panel{padding:16px;overflow:auto}.table-panel h2{margin:0 0 12px;font-size:18px}.org-table{border-collapse:collapse;width:100%;background:#fff}.org-table th,.org-table td{border:1px solid var(--line);padding:8px;text-align:left}.org-table th{background:#eff4ff}.org-table input{width:100%;border:1px solid transparent;padding:6px;border-radius:5px}.org-table input:focus{border-color:#aac4ff}
.home-grid{display:grid;grid-template-columns:repeat(4,minmax(260px,1fr));gap:12px}.grade{padding:11px;min-height:250px}.grade h3{margin:0 0 8px}.grade.over{outline:3px solid #84adff}.class-card{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:8px;margin:7px 0}.class-card.dragging{opacity:.45}.class-line{display:grid;grid-template-columns:48px 1fr 1fr;gap:5px;margin-bottom:5px}.class-card input{width:100%;border:1px solid #e1e7ef;border-radius:6px;padding:5px;font-size:12px}.class-label{font-size:11px;color:var(--muted);padding-top:5px}
.report{padding:16px}.report-controls{display:flex;gap:10px;align-items:center;margin-bottom:12px}.report table{width:100%;border-collapse:collapse}.report th,.report td{padding:8px;border-bottom:1px solid var(--line);text-align:left}.report th{background:#eff4ff}.note{font-size:12px;color:var(--muted);margin:8px 0}.hidden{display:none!important}
dialog{border:0;border-radius:14px;padding:0;box-shadow:0 20px 50px rgba(0,0,0,.2);width:min(520px,92vw)}dialog::backdrop{background:rgba(0,0,0,.3)}.modal{padding:18px}.modal h2{margin:0 0 10px}.modal textarea{width:100%;height:220px;border:1px solid var(--line);border-radius:8px;padding:8px}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
@media(max-width:950px){.grid-wrap{grid-template-columns:1fr}.side{position:static;max-height:none}.home-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){main{padding:10px}.board,.home-grid{grid-template-columns:1fr}.assignment-top{grid-template-columns:1fr 1fr}.brand small{display:none}}
@media print{header,.controls,.side,.addrow,.assignment button,.task button{display:none!important}body{background:#fff}.board{grid-template-columns:repeat(3,1fr);gap:6px}.dept{box-shadow:none;break-inside:avoid}.assignment{break-inside:avoid}.task textarea,.assignment input,.dept input{border:0!important}main{padding:0}.grid-wrap{display:block}}
</style>
</head>
<body>
<header>
 <div class="top">
  <div class="brand"><div class="logo">업</div><div><h1 id="titleText">교직원 업무분장 조정판</h1><small>드래그 이동 · 직접 편집 · 자동 저장</small></div></div>
  <div class="toolbar">
   <button onclick="undo()">↶ 되돌리기</button><button onclick="redo()">↷ 다시실행</button>
   <button onclick="exportData()">JSON 저장</button><button onclick="document.getElementById('file').click()">불러오기</button>
   <input id="file" type="file" accept=".json" hidden onchange="importData(event)">
   <button onclick="cloneNextYear()">다음 학년도 준비본</button>
   <button onclick="window.print()">인쇄/PDF</button>
   <button class="danger" onclick="resetData()">초기화</button>
   <span id="saveStatus" class="saved">저장됨</span>
  </div>
 </div>
 <nav class="tabs">
  <button class="tab active" data-tab="board" onclick="showTab('board')">업무 조정 보드</button>
  <button class="tab" data-tab="heads" onclick="showTab('heads')">보직교사 조직</button>
  <button class="tab" data-tab="homerooms" onclick="showTab('homerooms')">담임·부담임</button>
  <button class="tab" data-tab="report" onclick="showTab('report')">직원별 현황</button>
 </nav>
</header>
<main>
<section id="view-board">
 <div class="panel controls">
  <input id="search" type="search" placeholder="부서·담당자·업무 검색" oninput="renderBoard()">
  <button id="supportToggle" class="pill on" onclick="toggleSupport()">교무행정지원팀 표시</button>
  <button class="pill on" onclick="addDept()">+ 새 부서</button>
  <span class="note">카드 전체 또는 세부 업무 한 줄을 끌어 옮기세요. 빈 업무 묶음도 추가할 수 있습니다.</span>
 </div>
 <div class="grid-wrap"><div id="board" class="board"></div><aside id="side" class="panel side"></aside></div>
</section>
<section id="view-heads" class="hidden"><div id="heads" class="panel table-panel"></div></section>
<section id="view-homerooms" class="hidden"><div class="panel controls"><span class="note">학급 카드를 학년 칸 사이로 끌어 이동하거나 각 칸을 바로 고치세요.</span><button onclick="addClass()">+ 학급 추가</button></div><div id="homerooms" class="home-grid"></div></section>
<section id="view-report" class="hidden"><div id="report" class="panel report"></div></section>
</main>
<dialog id="moveDialog"><div class="modal"><h2>업무 이동</h2><p id="moveLabel"></p><select id="moveTarget" style="width:100%;padding:8px"></select><div class="modal-actions"><button onclick="moveDialog.close()">취소</button><button class="primary" onclick="completeMove()">이동</button></div></div></dialog>

const KEY='schoolWorkAssignmentBoard_v1';
let state=load(), history=[], future=[], activeTab='board', showSupport=true, drag=null, pendingMove=null;
function deep(v){return JSON.parse(JSON.stringify(v))}
function uid(prefix='x'){return prefix+Math.random().toString(36).slice(2,9)}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||deep(INITIAL_DATA)}catch(e){return deep(INITIAL_DATA)}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));const el=document.getElementById('saveStatus');el.textContent='저장됨 '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});el.style.color='#087443'}
function snap(){history.push(JSON.stringify(state));if(history.length>80)history.shift();future=[]}
function changed(){save();renderAll()}
function undo(){if(!history.length)return;future.push(JSON.stringify(state));state=JSON.parse(history.pop());save();renderAll()}
function redo(){if(!future.length)return;history.push(JSON.stringify(state));state=JSON.parse(future.pop());save();renderAll()}
function esc(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function autoSize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}
function showTab(tab){activeTab=tab;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('main>section').forEach(s=>s.classList.add('hidden'));document.getElementById('view-'+tab).classList.remove('hidden');renderAll()}
function renderAll(){document.getElementById('titleText').textContent=state.year+' '+state.school+' 업무분장 조정판';renderBoard();renderHeads();renderHomerooms();renderReport()}
function findDept(id){return state.departments.find(d=>d.id===id)}
function findAssignment(id){for(const d of state.departments){const a=d.assignments.find(x=>x.id===id);if(a)return {dept:d,a}}}
function updateDept(id,key,val){snap();findDept(id)[key]=val;changed()}
function updateAssignment(id,key,val){snap();findAssignment(id).a[key]=val;changed()}
function updateTask(aid,idx,val){snap();findAssignment(aid).a.duties[idx]=val;save();renderSide()}
function toggleSupport(){showSupport=!showSupport;document.getElementById('supportToggle').classList.toggle('on',showSupport);renderBoard()}
function matches(d,q){if(!q)return true;return [d.name,d.head,...d.assignments.flatMap(a=>[a.role,a.person,a.homeroom,...a.duties])].join(' ').toLowerCase().includes(q)}
function renderBoard(){
 const root=document.getElementById('board'), q=(document.getElementById('search')?.value||'').trim().toLowerCase();
 const depts=state.departments.filter(d=>(showSupport||d.kind!=='support')&&matches(d,q));
 root.innerHTML=depts.map(d=>`<article class="dept ${d.kind}" data-dept="${d.id}" ondragover="allowDept(event,'${d.id}')" ondrop="dropDept(event,'${d.id}')">
 <div class="dept-head"><div class="dept-title"><input value="${esc(d.name)}" onchange="updateDept('${d.id}','name',this.value)"><span class="badge">${d.assignments.reduce((n,a)=>n+a.duties.length,0)}개 업무</span></div>
 <div class="headline">부장/책임 <input value="${esc(d.head)}" placeholder="이름" onchange="updateDept('${d.id}','head',this.value)"></div></div>
 <div class="cards">${d.assignments.map(a=>assignmentHtml(d,a)).join('')}<button class="mini" onclick="addAssignment('${d.id}')">+ 담당 묶음 추가</button></div></article>`).join('');
 root.querySelectorAll('textarea').forEach(autoSize);renderSide()
}
function assignmentHtml(d,a){return `<div class="assignment" draggable="true" data-assignment="${a.id}" ondragstart="startAssignment(event,'${a.id}')" ondragend="endDrag(event)">
 <div class="assignment-top"><input title="업무 구분" value="${esc(a.role)}" placeholder="업무" onchange="updateAssignment('${a.id}','role',this.value)">
 <input title="담당자" value="${esc(a.person)}" placeholder="담당자" onchange="updateAssignment('${a.id}','person',this.value)">
 <input title="담임" value="${esc(a.homeroom)}" placeholder="담임" onchange="updateAssignment('${a.id}','homeroom',this.value)">
 <span><button title="다른 곳으로 이동" onclick="openMove(event,'assignment','${a.id}')">⇢</button><button class="danger" title="삭제" onclick="deleteAssignment(event,'${d.id}','${a.id}')">×</button></span></div>
 <div class="tasks" data-aid="${a.id}" ondragover="allowTasks(event,'${a.id}')" ondrop="dropTask(event,'${a.id}')">${a.duties.map((t,i)=>`<div class="task" draggable="true" ondragstart="startTask(event,'${a.id}',${i})" ondragend="endDrag(event)"><span>⠿</span><textarea rows="1" oninput="autoSize(this)" onchange="updateTask('${a.id}',${i},this.value)">${esc(t)}</textarea><button onclick="openMove(event,'task','${a.id}',${i})">⇢</button><button onclick="deleteTask(event,'${a.id}',${i})">×</button></div>`).join('')}</div>
 <div class="addrow"><button class="mini" onclick="addTask(event,'${a.id}')">+ 세부 업무</button><button class="mini" onclick="copyAssignment(event,'${d.id}','${a.id}')">복제</button></div></div>`
}
function startAssignment(e,id){if(e.target.closest('.task')||['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName)){e.preventDefault();return}drag={type:'assignment',id};e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id)}
function startTask(e,aid,idx){if(['TEXTAREA','BUTTON'].includes(e.target.tagName)){e.preventDefault();return}e.stopPropagation();drag={type:'task',aid,idx};e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',aid+':'+idx)}
function endDrag(){document.querySelectorAll('.dragging,.over').forEach(e=>e.classList.remove('dragging','over'));drag=null}
function allowDept(e,id){if(drag?.type==='assignment'){e.preventDefault();e.currentTarget.classList.add('over')}}
function dropDept(e,did){if(!drag||drag.type!=='assignment')return;e.preventDefault();const from=findAssignment(drag.id), to=findDept(did);if(!from||!to||from.dept.id===did)return endDrag();snap();from.dept.assignments=from.dept.assignments.filter(a=>a.id!==drag.id);to.assignments.push(from.a);endDrag();changed()}
function allowTasks(e){if(drag?.type==='task'){e.preventDefault();e.stopPropagation();e.currentTarget.classList.add('over')}}
function dropTask(e,targetAid){if(!drag||drag.type!=='task')return;e.preventDefault();e.stopPropagation();const source=findAssignment(drag.aid).a,target=findAssignment(targetAid).a;const val=source.duties[drag.idx];snap();source.duties.splice(drag.idx,1);target.duties.push(val);endDrag();changed()}
function addTask(e,aid){e.stopPropagation();snap();findAssignment(aid).a.duties.push('새 업무');changed()}
function deleteTask(e,aid,idx){e.stopPropagation();if(!confirm('이 세부 업무를 삭제할까요?'))return;snap();findAssignment(aid).a.duties.splice(idx,1);changed()}
function addAssignment(did){snap();findDept(did).assignments.push({id:uid('a'),role:'새 업무',person:'',homeroom:'',duties:['새 세부 업무']});changed()}
function copyAssignment(e,did,aid){e.stopPropagation();snap();const a=deep(findAssignment(aid).a);a.id=uid('a');a.role+=' (복제)';findDept(did).assignments.push(a);changed()}
function deleteAssignment(e,did,aid){e.stopPropagation();if(!confirm('이 담당 묶음과 포함된 업무를 삭제할까요?'))return;snap();findDept(did).assignments=findDept(did).assignments.filter(a=>a.id!==aid);changed()}
function addDept(){snap();state.departments.splice(state.departments.length-1,0,{id:uid('d'),name:'새 부서',head:'',kind:'main',assignments:[]});changed()}
function renderSide(){
 const all=state.departments.flatMap(d=>d.assignments.map(a=>({d,a}))), map={};
 all.forEach(({d,a})=>{if(!a.person)return;map[a.person]??={name:a.person,cards:0,tasks:0,depts:new Set()};map[a.person].cards++;map[a.person].tasks+=a.duties.length;map[a.person].depts.add(d.name)});
 const people=Object.values(map).sort((a,b)=>b.tasks-a.tasks||a.name.localeCompare(b.name,'ko'));
 const taskCount=all.reduce((n,x)=>n+x.a.duties.length,0);
 document.getElementById('side').innerHTML=`<h3>조정 현황</h3><div class="metric"><div><strong>${state.departments.filter(d=>d.kind==='main').length}</strong>부서</div><div><strong>${taskCount}</strong>세부업무</div></div><h3>담당자별 업무 수</h3><div class="note">세부 업무 줄 수 기준입니다.</div>${people.map(p=>`<div class="person"><button onclick="filterPerson('${esc(p.name)}')">${esc(p.name)}</button><span>${p.cards}묶음</span><b>${p.tasks}개</b></div>`).join('')}`
}
function filterPerson(name){document.getElementById('search').value=name;renderBoard()}
function renderHeads(){
 const main=state.departments.filter(d=>d.kind==='main');
 document.getElementById('heads').innerHTML=`<h2>보직교사 조직</h2><p class="note">부서명과 부장 이름을 수정하면 업무 조정 보드에도 즉시 반영됩니다.</p><table class="org-table"><thead><tr><th style="width:60px">순</th><th>부서명</th><th>성명</th><th style="width:90px">업무 묶음</th></tr></thead><tbody>${main.map((d,i)=>`<tr><td>${i+1}</td><td><input value="${esc(d.name)}" onchange="updateDept('${d.id}','name',this.value)"></td><td><input value="${esc(d.head)}" onchange="updateDept('${d.id}','head',this.value)"></td><td>${d.assignments.length}</td></tr>`).join('')}</tbody></table>`
}
function renderHomerooms(){
 const grades=['1학년','2학년','3학년','특수'];
 document.getElementById('homerooms').innerHTML=grades.map(g=>`<section class="grade panel" data-grade="${g}" ondragover="allowGrade(event)" ondrop="dropGrade(event,'${g}')"><h3>${g}</h3>${state.homerooms.filter(h=>h.grade===g).sort((a,b)=>Number(a.classNo)-Number(b.classNo)).map(classHtml).join('')}</section>`).join('')
}
function classHtml(h){return `<div class="class-card" draggable="true" ondragstart="startClass(event,'${h.id}')" ondragend="endDrag()"><div class="class-line"><input value="${esc(h.classNo)}" title="학급" onchange="updateClass('${h.id}','classNo',this.value)"><input value="${esc(h.teacher)}" placeholder="담임" onchange="updateClass('${h.id}','teacher',this.value)"><input value="${esc(h.subject)}" placeholder="교과" onchange="updateClass('${h.id}','subject',this.value)"></div><div class="class-line"><span class="class-label">부담임</span><input value="${esc(h.coTeacher)}" placeholder="부담임" onchange="updateClass('${h.id}','coTeacher',this.value)"><input value="${esc(h.coSubject)}" placeholder="교과" onchange="updateClass('${h.id}','coSubject',this.value)"></div></div>`}
function startClass(e,id){if(e.target.tagName==='INPUT'){e.preventDefault();return}drag={type:'class',id};e.currentTarget.classList.add('dragging');e.dataTransfer.setData('text/plain',id)}
function allowGrade(e){if(drag?.type==='class'){e.preventDefault();e.currentTarget.classList.add('over')}}
function dropGrade(e,grade){if(drag?.type!=='class')return;e.preventDefault();snap();state.homerooms.find(h=>h.id===drag.id).grade=grade;endDrag();changed()}
function updateClass(id,key,val){snap();state.homerooms.find(h=>h.id===id)[key]=val;changed()}
function addClass(){snap();state.homerooms.push({id:uid('h'),grade:'1학년',classNo:'새',teacher:'',subject:'',coTeacher:'',coSubject:''});changed()}
function personRows(){
 const map={};
 state.departments.forEach(d=>d.assignments.forEach(a=>{if(!a.person)return;map[a.person]??={name:a.person,depts:[],roles:[],tasks:0,home:[]};map[a.person].depts.push(d.name);map[a.person].roles.push(a.role);map[a.person].tasks+=a.duties.length;if(a.homeroom)map[a.person].home.push(a.homeroom)}));
 state.homerooms.forEach(h=>{[h.teacher,h.coTeacher].forEach((n,i)=>{if(!n)return;map[n]??={name:n,depts:[],roles:[],tasks:0,home:[]};map[n].home.push(`${h.grade} ${h.classNo}반 ${i?'부담임':'담임'}`)})});
 return Object.values(map).sort((a,b)=>b.tasks-a.tasks||a.name.localeCompare(b.name,'ko'))
}
function renderReport(){
 const rows=personRows();document.getElementById('report').innerHTML=`<h2>직원별 배정 현황</h2><p class="note">업무 이동 후 중복·편중을 확인하기 위한 화면입니다. 업무 수는 세부 업무 단위로 집계됩니다.</p><table><thead><tr><th>성명</th><th>부서 / 역할</th><th>세부업무 수</th><th>담임·부담임 / 부서담임</th></tr></thead><tbody>${rows.map(p=>`<tr><td><b>${esc(p.name)}</b></td><td>${p.depts.map((d,i)=>esc(d)+' · '+esc(p.roles[i])).join('<br>')}</td><td>${p.tasks}</td><td>${esc([...new Set(p.home)].join(', '))}</td></tr>`).join('')}</tbody></table>`
}
function openMove(e,type,aid,idx){e.stopPropagation();pendingMove={type,aid,idx};const sel=document.getElementById('moveTarget');sel.innerHTML=state.departments.flatMap(d=>d.assignments.map(a=>`<option value="${a.id}">${esc(d.name)} / ${esc(a.role)} / ${esc(a.person||'미지정')}</option>`)).join('');if(type==='assignment'){sel.innerHTML=state.departments.map(d=>`<option value="${d.id}">${esc(d.name)}</option>`).join('')}document.getElementById('moveLabel').textContent=type==='task'?'세부 업무를 이동할 담당 묶음을 선택하세요.':'담당 묶음을 이동할 부서를 선택하세요.';moveDialog.showModal()}
function completeMove(){const target=document.getElementById('moveTarget').value;if(pendingMove.type==='assignment'){const f=findAssignment(pendingMove.aid);if(f.dept.id!==target){snap();f.dept.assignments=f.dept.assignments.filter(a=>a.id!==pendingMove.aid);findDept(target).assignments.push(f.a);changed()}}else{const from=findAssignment(pendingMove.aid).a,to=findAssignment(target).a;if(from && to){snap();const t=from.duties.splice(pendingMove.idx,1)[0];to.duties.push(t);changed()}}moveDialog.close()}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(state.year||'업무분장')+'_조정데이터.json';a.click();URL.revokeObjectURL(a.href)}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const incoming=JSON.parse(r.result);if(!incoming.departments||!incoming.homerooms)throw Error();snap();state=incoming;changed();alert('자료를 불러왔습니다.')}catch(err){alert('올바른 업무분장 JSON 파일이 아닙니다.')}};r.readAsText(f);e.target.value=''}
function cloneNextYear(){const y=prompt('준비할 새 학년도를 입력하세요.', String((parseInt(state.year)||2026)+1)+'학년도');if(!y)return;snap();state.year=y;changed();alert('현재 배치를 유지한 새 학년도 준비본입니다. JSON 저장으로 백업해 두세요.')}
function resetData(){if(!confirm('모든 변경을 지우고 2026학년도 원본 자료로 되돌릴까요?'))return;snap();state=deep(INITIAL_DATA);changed()}
save();renderAll()
</script>
</body></html>
